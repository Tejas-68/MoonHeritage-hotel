# ─── DataSource (XAMPP MySQL) ───────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/moonheritage?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Server ─────────────────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/api

# ─── JWT ────────────────────────────────────────────────────────────
jwt.secret=MoonHeritage-Super-Secret-Key-2024-Must-Be-At-Least-256-Bits-Long!
jwt.expiration=86400000

# ─── File upload ────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Logging ────────────────────────────────────────────────────────
logging.level.com.moonheritage=INFO

# ─── File Upload ─────────────────────────────────────────────────────
app.upload.dir=/Applications/XAMPP/xamppfiles/htdocs/MoonHeritage/images/
