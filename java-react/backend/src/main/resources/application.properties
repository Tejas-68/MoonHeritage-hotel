# ─── MongoDB ─────────────────────────────────────────────────────────
# ⬇⬇  Replace <db_password> with your Atlas password for local dev  ⬇⬇
# spring.data.mongodb.uri=mongodb+srv://Tejas68:<db_password>@moon-heritage.vlzngzv.mongodb.net/moonheritage?retryWrites=true&w=majority&appName=moon-heritage
#
# In production (Render), this is overridden by the MONGODB_URI env var:
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/moonheritage}

# ─── Server ──────────────────────────────────────────────────────────
server.port=${PORT:8081}
server.servlet.context-path=/api

# ─── JWT ─────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:MoonHeritage-Super-Secret-Key-2024-Must-Be-At-Least-256-Bits-Long!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── File upload ─────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── CORS allowed origins (set your Vercel URL here) ─────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── Secure cookies (set COOKIE_SECURE=true on Render/production) ────
cookie.secure=${COOKIE_SECURE:false}

# ─── Logging ─────────────────────────────────────────────────────────
logging.level.com.moonheritage=INFO
